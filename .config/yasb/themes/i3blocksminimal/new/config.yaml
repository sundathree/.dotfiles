watch_stylesheet: true
watch_config: true
debug: false
komorebi:
  start_command: "komorebic start --whkd"
  stop_command: "komorebic stop"
  reload_command: "komorebic stop && komorebic start --whkd"
bars:
  status-bar:
    enabled: true
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      position: "bottom"
      center: false
    blur_effect:
      enabled: false
      acrylic: false
      dark_mode: true
      round_corners: false
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 20
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left: ["komorebi_workspaces"]
      right: ["cpu", "separator", "memory", "separator", "volume", "separator", "clock"]
widgets:
  separator:
    type: "yasb.custom.CustomWidget"
    options:
      label: "|"
      label_alt: "|"
      class_name: "separator-widget"
      callbacks:
        on_left: "do_nothing"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "\uf4bc {info[percent][total]}%"
      update_interval: 3000
      callbacks:
        on_left: "do_nothing"
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "\uefc5 {virtual_mem_used}"
      update_interval: 3000
      callbacks:
        on_left: "do_nothing"
  clock: 
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%Y-%m-%d %H:%M:%S}"
      timezones: []
      callbacks:
        on_left: "do_nothing"
        on_right: "do_nothing"
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: " \ue654 offline"
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
      label_workspace_populated_btn: "{index}"
      hide_empty_workspaces: true
      animation: false
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      volume_icons:
        - "\ueee8 "  # Icon for muted
        - "\uf026 "  # Icon for 0-10% volume
        - "\uf027 "  # Icon for 11-30% volume
        - "\uf027 "  # Icon for 31-60% volume
        - "\uf028 "  # Icon for 61-100% volume
      callbacks:
        on_left: "do_nothing"
        on_right: "toggle_mute" 
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "\uf001 {title}"
      label_alt: "\uf001 {artist}"
      hide_empty: true
      max_field_size:
        label: 100
      show_thumbnail: false
      controls_hide: true
      callbacks:
        on_left: "toggle_label"
